product:
  name: "Kanban Todo App"
  description: "Trello 스타일의 칸반 보드 Todo 앱. 3칼럼 고정 보드에서 카드를 드래그&드롭으로 관리하고, 검색·필터·다크모드를 지원한다."

features:
  - id: kanban-card-add
    title: "카드 추가"
    scenarios:
      - id: KANBAN-001
        given: "'To Do' 칼럼에 카드가 없는 빈 보드"
        when: "'To Do' 칼럼의 '카드 추가' 버튼을 클릭하고, 제목 입력란에 '장보기'를 입력한 후 확인한다"
        then: "'To Do' 칼럼에 '장보기' 카드가 표시된다"
        examples:
          - input: { column: "To Do", title: "장보기" }
            expect: { cardText: "장보기", columnCardCount: 1 }
      - id: KANBAN-002
        given: "'To Do' 칼럼의 카드 추가 입력란이 비어 있는 상태"
        when: "제목을 입력하지 않고 확인한다"
        then: "'제목을 입력해주세요' 오류 메시지가 표시된다"
        examples:
          - input: { column: "To Do", title: "" }
            expect: { errorMessage: "제목을 입력해주세요" }

  - id: kanban-card-edit
    title: "카드 상세 편집"
    scenarios:
      - id: KANBAN-003
        given: "'To Do' 칼럼에 '장보기' 카드가 있는 보드"
        when: "'장보기' 카드를 클릭한다"
        then: "카드 상세 모달에 제목, 설명, 우선순위, 태그, 서브태스크 섹션이 표시된다"
        examples:
          - input: { clickCard: "장보기" }
            expect: { modalTitle: "장보기", sectionLabels: ["설명", "우선순위", "태그", "서브태스크"] }
      - id: KANBAN-004
        given: "'장보기' 카드의 상세 모달이 열린 상태"
        when: "설명란에 '마트 가서 장보기'를 입력하고 저장한다"
        then: "모달을 닫고 다시 열면 설명에 '마트 가서 장보기'가 표시된다"
        examples:
          - input: { description: "마트 가서 장보기" }
            expect: { descriptionText: "마트 가서 장보기" }
      - id: KANBAN-005
        given: "'장보기' 카드의 상세 모달이 열린 상태"
        when: "우선순위를 'High'로 변경한다"
        then: "카드에 'High' 우선순위가 표시된다"
        examples:
          - input: { priority: "High" }
            expect: { cardPriority: "High" }
      - id: KANBAN-006
        given: "'장보기' 카드의 상세 모달이 열린 상태"
        when: "태그 입력란에 '개인'을 입력하고 추가한다"
        then: "카드에 '개인' 태그가 표시된다"
        examples:
          - input: { tag: "개인" }
            expect: { cardTags: ["개인"] }

  - id: kanban-card-inline-edit
    title: "카드 인라인 제목 편집"
    scenarios:
      - id: KANBAN-007
        given: "'To Do' 칼럼에 '장보기' 카드가 있는 보드"
        when: "'장보기' 카드의 제목을 클릭하고 '마트 장보기'로 수정한 후 Enter를 누른다"
        then: "카드 제목이 '마트 장보기'로 표시된다"
        examples:
          - input: { originalTitle: "장보기", newTitle: "마트 장보기" }
            expect: { cardText: "마트 장보기" }
      - id: KANBAN-008
        given: "'To Do' 칼럼에 '장보기' 카드가 있는 보드"
        when: "'장보기' 카드의 제목을 클릭하고 빈 문자열로 수정한 후 Enter를 누른다"
        then: "카드 제목이 '장보기'로 유지된다"
        examples:
          - input: { originalTitle: "장보기", newTitle: "" }
            expect: { cardText: "장보기" }

  - id: kanban-card-delete
    title: "카드 삭제"
    scenarios:
      - id: KANBAN-009
        given: "'장보기' 카드의 상세 모달이 열린 상태"
        when: "'삭제' 버튼을 클릭한다"
        then: "'정말 삭제하시겠습니까?' 확인 다이얼로그가 표시된다"
        examples:
          - input: { clickDelete: true }
            expect: { confirmDialog: true, confirmMessage: "정말 삭제하시겠습니까?" }
      - id: KANBAN-010
        given: "'정말 삭제하시겠습니까?' 확인 다이얼로그가 표시된 상태"
        when: "'확인' 버튼을 클릭한다"
        then: "카드가 보드에서 제거된다"
        examples:
          - input: { confirmDelete: true }
            expect: { cardExists: false }
      - id: KANBAN-011
        given: "'정말 삭제하시겠습니까?' 확인 다이얼로그가 표시된 상태"
        when: "'취소' 버튼을 클릭한다"
        then: "다이얼로그가 닫히고 카드가 유지된다"
        examples:
          - input: { confirmDelete: false }
            expect: { cardExists: true, confirmDialog: false }

  - id: kanban-subtask
    title: "서브태스크 관리"
    scenarios:
      - id: KANBAN-012
        given: "'장보기' 카드의 상세 모달이 열리고 서브태스크가 없는 상태"
        when: "서브태스크 입력란에 '우유 사기'를 입력하고 추가한다"
        then: "체크리스트에 '우유 사기' 항목이 표시된다"
        examples:
          - input: { subtaskTitle: "우유 사기" }
            expect: { subtaskText: "우유 사기", subtaskCount: 1 }
      - id: KANBAN-013
        given: "'장보기' 카드에 '우유 사기' 서브태스크 1개가 있는 상태"
        when: "'우유 사기' 체크박스를 클릭한다"
        then: "'우유 사기'가 완료 표시되고 진행률 '1/1'이 표시된다"
        examples:
          - input: { toggleSubtask: "우유 사기" }
            expect: { subtaskChecked: true, progress: "1/1" }
      - id: KANBAN-014
        given: "'장보기' 카드에 '우유 사기'(완료), '빵 사기'(미완료) 서브태스크 2개가 있는 상태"
        when: "'장보기' 카드의 상세 모달을 연다"
        then: "진행률 '1/2'가 표시된다"
        examples:
          - input: { completedSubtasks: 1, totalSubtasks: 2 }
            expect: { progress: "1/2" }

  - id: kanban-drag-drop
    title: "드래그&드롭"
    scenarios:
      - id: KANBAN-015
        given: "'To Do' 칼럼에 '장보기' 카드가 있는 보드"
        when: "'장보기' 카드를 'In Progress' 칼럼으로 드래그&드롭한다"
        then: "'In Progress' 칼럼에 '장보기' 카드가 표시되고, 'To Do' 칼럼에서는 제거된다"
        examples:
          - input: { card: "장보기", fromColumn: "To Do", toColumn: "In Progress" }
            expect: { inProgressCards: ["장보기"], toDoCards: [] }
      - id: KANBAN-016
        given: "'To Do' 칼럼에 '장보기', '운동하기', '공부하기' 순서로 카드가 있는 보드"
        when: "'공부하기' 카드를 '장보기' 위로 드래그&드롭한다"
        then: "'To Do' 칼럼의 순서가 '공부하기', '장보기', '운동하기'로 변경된다"
        examples:
          - input: { card: "공부하기", toIndex: 0 }
            expect: { toDoCards: ["공부하기", "장보기", "운동하기"] }
      - id: KANBAN-027
        given: "'In Progress' 칼럼에 '장보기' 카드가 있는 보드"
        when: "'장보기' 카드를 'Done' 칼럼으로 드래그&드롭한다"
        then: "'Done' 칼럼에 '장보기' 카드가 표시되고, 'In Progress' 칼럼에서는 제거된다"
        examples:
          - input: { card: "장보기", fromColumn: "In Progress", toColumn: "Done" }
            expect: { doneCards: ["장보기"], inProgressCards: [] }

  - id: kanban-search
    title: "제목 검색"
    scenarios:
      - id: KANBAN-017
        given: "보드에 '장보기', '공부하기', '운동하기' 카드가 있는 상태"
        when: "검색바에 '장'을 입력한다"
        then: "'장보기' 카드만 표시되고 나머지는 숨겨진다"
        examples:
          - input: { searchQuery: "장" }
            expect: { visibleCards: ["장보기"], hiddenCards: ["공부하기", "운동하기"] }
      - id: KANBAN-018
        given: "검색바에 '장'이 입력되어 '장보기'만 표시된 상태"
        when: "검색어를 모두 삭제한다"
        then: "모든 카드가 다시 표시된다"
        examples:
          - input: { searchQuery: "" }
            expect: { visibleCardCount: 3 }
      - id: KANBAN-028
        given: "보드에 '장보기', '공부하기', '운동하기' 카드가 있는 상태"
        when: "검색바에 '하기'를 입력한다"
        then: "'장보기', '공부하기', '운동하기' 3개 카드 모두 표시된다"
        examples:
          - input: { searchQuery: "하기" }
            expect: { visibleCards: ["장보기", "공부하기", "운동하기"], visibleCardCount: 3 }

  - id: kanban-filter
    title: "우선순위·태그 필터"
    scenarios:
      - id: KANBAN-019
        given: "우선순위 'High'인 '장보기'와 'Low'인 '공부하기' 카드가 있는 보드"
        when: "우선순위 필터에서 'High'를 선택한다"
        then: "'장보기' 카드만 표시된다"
        examples:
          - input: { priorityFilter: "High" }
            expect: { visibleCards: ["장보기"] }
      - id: KANBAN-020
        given: "'개인' 태그가 있는 '장보기'와 태그 없는 '공부하기' 카드가 있는 보드"
        when: "태그 필터에서 '개인'을 선택한다"
        then: "'장보기' 카드만 표시된다"
        examples:
          - input: { tagFilter: "개인" }
            expect: { visibleCards: ["장보기"] }
      - id: KANBAN-021
        given: "우선순위 'High'인 '장보기', 'Low'인 '공부하기', 'High'인 '운동하기' 카드가 있는 보드"
        when: "검색바에 '장'을 입력하고 우선순위 필터에서 'High'를 선택한다"
        then: "제목에 '장'이 포함되고 우선순위가 'High'인 '장보기' 카드만 표시된다 (AND 조합)"
        examples:
          - input: { searchQuery: "장", priorityFilter: "High" }
            expect: { visibleCards: ["장보기"] }
      - id: KANBAN-029
        given: "우선순위 필터 'High'가 선택되어 '장보기' 카드만 표시된 상태"
        when: "우선순위 필터를 '전체'로 변경한다"
        then: "모든 카드가 다시 표시된다"
        examples:
          - input: { priorityFilter: null }
            expect: { visibleCardCount: 3 }

  - id: kanban-darkmode
    title: "다크모드 토글"
    scenarios:
      - id: KANBAN-022
        given: "라이트모드 상태의 앱"
        when: "헤더의 다크모드 토글 버튼을 클릭한다"
        then: "앱 전체가 다크모드로 전환된다"
        examples:
          - input: { currentMode: "light" }
            expect: { darkMode: true }
      - id: KANBAN-023
        given: "다크모드 상태의 앱"
        when: "헤더의 다크모드 토글 버튼을 클릭한다"
        then: "앱 전체가 라이트모드로 전환된다"
        examples:
          - input: { currentMode: "dark" }
            expect: { darkMode: false }

  - id: kanban-persistence
    title: "localStorage 데이터 영속성"
    scenarios:
      - id: KANBAN-024
        given: "카드 3개가 추가된 보드"
        when: "페이지를 새로고침한다"
        then: "3개 카드가 그대로 표시된다"
        examples:
          - input: { reload: true }
            expect: { cardCount: 3 }
      - id: KANBAN-025
        given: "'장보기' 카드를 'In Progress'로 이동한 보드"
        when: "페이지를 새로고침한다"
        then: "'In Progress' 칼럼에 '장보기' 카드가 유지된다"
        examples:
          - input: { reload: true }
            expect: { inProgressCards: ["장보기"] }
      - id: KANBAN-026
        given: "다크모드로 설정된 앱"
        when: "페이지를 새로고침한다"
        then: "다크모드가 유지된다"
        examples:
          - input: { reload: true }
            expect: { darkMode: true }
