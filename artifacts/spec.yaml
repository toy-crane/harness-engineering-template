version: 1

scenarios:
  - id: "KANBAN-001"
    name: "카드 추가"
    given: "Todo 칼럼이 비어있다"
    when: "사용자가 제목을 입력하고 카드를 추가한다"
    then: "Todo 칼럼 맨 아래에 새 카드가 생성된다"
    examples:
      - input: { title: "회의록 작성" }
        expect: { cardTitle: "회의록 작성", column: "Todo", priority: "Medium" }
      - input: { title: "" }
        expect: { errorMessage: "제목을 입력해주세요", cardCount: 0 }

  - id: "KANBAN-002"
    name: "카드 삭제"
    given: "Todo 칼럼에 카드가 1개 존재한다"
    when: "사용자가 카드의 삭제 버튼을 클릭한다"
    then: "확인 대화상자가 표시되고, 확인 시 카드가 삭제된다"
    examples:
      - input: { action: "삭제 클릭" }
        expect: { confirmDialog: "정말 삭제하시겠습니까?", visible: true }
      - input: { action: "확인 클릭" }
        expect: { cardCount: 0 }
      - input: { action: "취소 클릭" }
        expect: { cardCount: 1 }

  - id: "KANBAN-003"
    name: "카드 인라인 제목 편집"
    given: "카드 '회의록 작성'이 존재한다"
    when: "사용자가 카드 제목을 클릭하고 수정한다"
    then: "제목이 입력 필드로 변경되고 포커스 해제 시 저장된다"
    examples:
      - input: { clickTarget: "카드 제목", newTitle: "주간 보고서 작성" }
        expect: { cardTitle: "주간 보고서 작성" }

  - id: "KANBAN-004"
    name: "카드 우선순위 변경"
    given: "카드 상세 모달이 열려있다"
    when: "사용자가 우선순위를 변경한다"
    then: "카드에 변경된 우선순위 색상이 표시된다"
    examples:
      - input: { priority: "High" }
        expect: { priorityColor: "red" }
      - input: { priority: "Medium" }
        expect: { priorityColor: "yellow" }
      - input: { priority: "Low" }
        expect: { priorityColor: "green" }

  - id: "KANBAN-005"
    name: "태그 추가"
    given: "카드 상세 모달이 열려있다"
    when: "사용자가 태그를 입력하고 추가한다"
    then: "카드에 태그가 표시된다"
    examples:
      - input: { tag: "버그" }
        expect: { tagText: "버그", tagVisible: true }

  - id: "KANBAN-006"
    name: "마감일 설정"
    given: "카드 상세 모달이 열려있다"
    when: "사용자가 마감일을 설정한다"
    then: "카드에 마감일이 표시된다"
    examples:
      - input: { dueDate: "2026-03-20" }
        expect: { dueDateText: "2026-03-20", visible: true }

  - id: "KANBAN-007"
    name: "서브태스크 추가 및 토글"
    given: "카드에 서브태스크가 없다"
    when: "사용자가 서브태스크를 추가하고 토글한다"
    then: "서브태스크 상태가 변경되고 진행률이 업데이트된다"
    examples:
      - input: { subtasks: ["자료 조사", "초안 작성", "리뷰"], completed: 0 }
        expect: { progress: "0/3" }
      - input: { subtasks: ["자료 조사", "초안 작성", "리뷰"], completed: 2 }
        expect: { progress: "2/3" }
      - input: { subtasks: ["자료 조사", "초안 작성", "리뷰"], completed: 3 }
        expect: { progress: "3/3" }

  - id: "KANBAN-008"
    name: "칼럼 간 드래그&드롭"
    given: "Todo 칼럼에 카드가 존재한다"
    when: "사용자가 카드를 다른 칼럼으로 드래그&드롭한다"
    then: "카드가 대상 칼럼으로 이동한다"
    examples:
      - input: { card: "회의록 작성", from: "Todo", to: "In Progress" }
        expect: { inProgressCards: ["회의록 작성"], todoCards: [] }
      - input: { card: "회의록 작성", from: "In Progress", to: "Done" }
        expect: { doneCards: ["회의록 작성"], inProgressCards: [] }

  - id: "KANBAN-009"
    name: "같은 칼럼 내 순서 변경"
    given: "Todo 칼럼에 카드 A, B, C가 순서대로 존재한다"
    when: "사용자가 C를 A 위로 드래그&드롭한다"
    then: "카드 순서가 C, A, B로 변경된다"
    examples:
      - input: { dragCard: "C", dropBefore: "A" }
        expect: { todoCards: ["C", "A", "B"] }

  - id: "KANBAN-010"
    name: "마감일 경고 표시"
    given: "마감일이 설정된 카드가 존재한다"
    when: "마감일이 현재 날짜보다 이전이면"
    then: "카드에 빨간 테두리가 표시된다"
    examples:
      - input: { dueDate: "2026-03-13", today: "2026-03-14" }
        expect: { overdueStyle: true }
      - input: { dueDate: "2026-03-15", today: "2026-03-14" }
        expect: { overdueStyle: false }

  - id: "KANBAN-011"
    name: "카드 제목 검색"
    given: "'회의록 작성'과 '주간 보고서' 카드가 존재한다"
    when: "사용자가 검색창에 텍스트를 입력한다"
    then: "제목에 해당 텍스트가 포함된 카드만 표시된다"
    examples:
      - input: { searchText: "회의" }
        expect: { visibleCards: ["회의록 작성"], hiddenCards: ["주간 보고서"] }
      - input: { searchText: "" }
        expect: { visibleCards: ["회의록 작성", "주간 보고서"] }

  - id: "KANBAN-012"
    name: "우선순위 필터"
    given: "High, Medium, Low 우선순위 카드가 각각 존재한다"
    when: "사용자가 우선순위 필터를 선택한다"
    then: "해당 우선순위의 카드만 표시된다"
    examples:
      - input: { priorityFilter: "High" }
        expect: { visiblePriorities: ["High"] }
      - input: { priorityFilter: "all" }
        expect: { visiblePriorities: ["High", "Medium", "Low"] }

  - id: "KANBAN-013"
    name: "태그 필터"
    given: "'버그' 태그 카드와 '기능' 태그 카드가 존재한다"
    when: "사용자가 태그 필터를 선택한다"
    then: "해당 태그가 있는 카드만 표시된다"
    examples:
      - input: { tagFilter: "버그" }
        expect: { visibleTags: ["버그"] }
      - input: { tagFilter: "all" }
        expect: { visibleTags: ["버그", "기능"] }

  - id: "KANBAN-014"
    name: "다크모드 토글"
    given: "라이트 모드가 활성화되어 있다"
    when: "사용자가 다크모드 토글을 클릭한다"
    then: "다크 모드로 전환되고 새로고침 후에도 유지된다"
    examples:
      - input: { toggleDarkMode: true }
        expect: { theme: "dark" }
      - input: { reload: true }
        expect: { theme: "dark" }

  - id: "KANBAN-015"
    name: "데이터 JSON 내보내기"
    given: "보드에 카드가 존재한다"
    when: "사용자가 내보내기 버튼을 클릭한다"
    then: "보드 데이터가 JSON 파일로 다운로드된다"
    examples:
      - input: { action: "내보내기 클릭" }
        expect: { fileDownloaded: true, fileFormat: "json" }

  - id: "KANBAN-016"
    name: "데이터 JSON 가져오기"
    given: "보드에 기존 카드가 존재한다"
    when: "사용자가 JSON 파일을 가져온다"
    then: "기존 데이터를 교체하고 파일 내용으로 보드를 복원한다"
    examples:
      - input: { file: "valid.json", cards: ["가져온 카드"] }
        expect: { visibleCards: ["가져온 카드"] }
      - input: { file: "invalid.json" }
        expect: { errorMessage: "올바른 JSON 파일이 아닙니다", dataPreserved: true }

  - id: "KANBAN-017"
    name: "데이터 영속성"
    given: "사용자가 카드를 추가한 상태이다"
    when: "페이지를 새로고침한다"
    then: "모든 보드 상태가 유지된다"
    examples:
      - input: { addCard: "회의록 작성", reload: true }
        expect: { cardTitle: "회의록 작성", visible: true }
